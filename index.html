<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>America Prays — Schedule (June 4–July 4, 2026)</title>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0c12; --bg2: #10131c; --bg3: #181c28; --bg4: #1f2435;
    --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
    --text: #e4e8f4; --text2: #7a82a0; --text3: #464e68;
    --accent: #5b9cf6; --accent2: #2d5fc4;
    --prime: #f5a623; --prime-bg: rgba(245,166,35,0.12);
    --morning: #34c98a; --morning-bg: rgba(52,201,138,0.10);
    --afternoon: #60c0f5; --afternoon-bg: rgba(96,192,245,0.10);
    --night: #a47cf0; --night-bg: rgba(164,124,240,0.10);
    --mid: #55606e; --mid-bg: rgba(85,96,110,0.10);
    --danger: #e05a5a; --success: #34c98a;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Consolas', 'Courier New', monospace;
    --radius: 7px; --radius-lg: 11px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 216px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── Brand ── */
  .brand { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }
  .brand-title { font-size: 13px; font-weight: 700; color: var(--prime); letter-spacing: 0.06em; text-transform: uppercase; }
  .brand-sub { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

  /* ── Auth badge in sidebar ── */
  .auth-badge { display: flex; align-items: center; gap: 7px; padding: 8px 12px; margin: 6px; border-radius: var(--radius); background: var(--bg3); border: 1px solid var(--border); font-size: 11px; }
  .auth-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .auth-dot.online { background: var(--success); }
  .auth-dot.offline { background: var(--text3); }
  .auth-label { flex: 1; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .auth-btn-small { font-size: 10px; padding: 2px 8px; border-radius: 5px; border: 1px solid var(--border2); background: none; color: var(--text3); cursor: pointer; white-space: nowrap; }
  .auth-btn-small:hover { color: var(--text); background: var(--bg4); }

  /* ── Nav ── */
  .sidebar-section { padding: 10px 8px 4px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 11px; border-radius: var(--radius); margin: 1px 5px; cursor: pointer; font-size: 12.5px; color: var(--text2); transition: background 0.13s, color 0.13s; user-select: none; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--prime-bg); color: var(--prime); }
  .nav-icon { font-size: 14px; width: 17px; text-align: center; }

  /* ── Day list ── */
  .day-list { flex: 1; overflow-y: auto; padding: 4px 5px 10px; }
  .day-list::-webkit-scrollbar { width: 3px; }
  .day-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .day-btn { display: flex; align-items: center; justify-content: space-between; padding: 5px 9px; border-radius: var(--radius); cursor: pointer; font-size: 11.5px; color: var(--text2); transition: background 0.1s; user-select: none; }
  .day-btn:hover { background: var(--bg3); color: var(--text); }
  .day-btn.active { background: var(--prime-bg); color: var(--prime); font-weight: 500; }
  .day-num { font-family: var(--mono); font-size: 10px; color: var(--text3); }

  /* ── Topbar ── */
  .topbar { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; flex-wrap: wrap; }
  .topbar-title { font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
  .topbar-sub { font-size: 11px; color: var(--text2); font-family: var(--mono); }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 12px; font-family: var(--font); cursor: pointer; transition: background 0.13s; white-space: nowrap; }
  .btn:hover { background: var(--bg4); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.accent { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .btn.accent:hover { background: var(--accent); }
  .btn.prime-btn { background: rgba(245,166,35,0.12); border-color: rgba(245,166,35,0.3); color: var(--prime); }
  .btn.prime-btn:hover { background: rgba(245,166,35,0.2); }
  .btn.danger { background: rgba(224,90,90,0.10); border-color: rgba(224,90,90,0.28); color: var(--danger); }
  .btn.danger:hover { background: rgba(224,90,90,0.18); }
  .btn.success-btn { background: rgba(52,201,138,0.10); border-color: rgba(52,201,138,0.28); color: var(--success); }
  .btn.success-btn:hover { background: rgba(52,201,138,0.18); }

  /* ── Inputs ── */
  input[type=text], input[type=search], input[type=email], input[type=password], select, textarea {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 13px; border-radius: var(--radius); padding: 6px 11px; outline: none; transition: border-color 0.13s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }

  /* ── Content ── */
  .content { flex: 1; overflow-y: auto; padding: 18px; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; }
  .stat-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .stat-val { font-size: 20px; font-weight: 600; font-family: var(--mono); color: var(--text); }

  /* ── Legend ── */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; }

  /* ── Table ── */
  .tbl-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 9px 13px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; background: var(--bg3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 7px 13px; font-size: 13px; vertical-align: middle; }
  .time-col { font-family: var(--mono); font-size: 11px; color: var(--text2); white-space: nowrap; width: 105px; }
  .ist-col  { font-family: var(--mono); font-size: 10px; color: var(--text3); white-space: nowrap; width: 105px; }
  .type-col { width: 95px; }

  /* ── Tags ── */
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 18px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
  .tag-prime     { background: var(--prime-bg);     color: var(--prime);     border: 1px solid rgba(245,166,35,0.22); }
  .tag-morning   { background: var(--morning-bg);   color: var(--morning);   border: 1px solid rgba(52,201,138,0.22); }
  .tag-afternoon { background: var(--afternoon-bg); color: var(--afternoon); border: 1px solid rgba(96,192,245,0.22); }
  .tag-night     { background: var(--night-bg);     color: var(--night);     border: 1px solid rgba(164,124,240,0.22); }
  .tag-mid       { background: var(--mid-bg);       color: var(--mid);       border: 1px solid rgba(85,96,110,0.28); }
  .prime-star { font-size: 9px; background: var(--prime-bg); color: var(--prime); padding: 2px 6px; border-radius: 9px; margin-left: 5px; border: 1px solid rgba(245,166,35,0.18); }

  /* ── Resource cards ── */
  .res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 9px; }
  .res-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 13px 15px; transition: border-color 0.13s; }
  .res-card:hover { border-color: var(--border2); }
  .res-name { font-size: 12.5px; font-weight: 500; color: var(--text); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; gap: 7px; }
  .res-name input { flex: 1; font-size: 12px; padding: 3px 7px; }
  .res-meta { font-size: 10.5px; color: var(--text3); font-family: var(--mono); }
  .res-prime-badge { font-size: 9.5px; background: var(--prime-bg); color: var(--prime); padding: 2px 5px; border-radius: 7px; margin-left: 3px; }

  /* ── Prime view ── */
  .prime-item { display: flex; align-items: center; gap: 9px; padding: 9px 13px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .prime-item:last-child { border-bottom: none; }
  .prime-item .res { flex: 1; font-weight: 500; }
  .prime-item .slots { font-family: var(--mono); font-size: 11px; color: var(--text2); width: 75px; }
  .prime-item .first { font-size: 10.5px; color: var(--text3); font-family: var(--mono); flex: 1; }
  .ok-dot   { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .warn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger);  flex-shrink: 0; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 20px 22px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text2); font-size: 17px; cursor: pointer; }
  .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .modal-row:last-child { border-bottom: none; }
  .modal-key { font-size: 11px; color: var(--text2); }
  .modal-val { font-size: 12.5px; font-weight: 500; text-align: right; }
  .modal-edit { display: flex; flex-direction: column; gap: 11px; margin-top: 3px; }
  .field-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }
  .modal-edit select, .modal-edit input { width: 100%; }

  /* ── Login screen ── */
  .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 300; }
  .login-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 32px 28px; width: 360px; max-width: 95vw; }
  .login-box h2 { font-size: 18px; font-weight: 700; color: var(--prime); margin-bottom: 6px; }
  .login-box p { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
  .login-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .login-field label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .login-field input { width: 100%; }
  .login-err { font-size: 12px; color: var(--danger); margin-bottom: 10px; min-height: 18px; }

  /* ── Sync indicator ── */
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .sync-dot.syncing { background: var(--prime); animation: pulse 1s infinite; }
  .sync-dot.synced  { background: var(--success); }
  .sync-dot.error   { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Misc ── */
  .toolbar { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .toolbar input[type=search] { flex: 1; min-width: 150px; }
  .icon-btn { background: none; border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text2); cursor: pointer; padding: 4px 7px; font-size: 12px; line-height: 1; transition: background 0.13s, color 0.13s; }
  .icon-btn:hover { background: var(--bg4); color: var(--text); }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .toast { position: fixed; bottom: 22px; right: 22px; background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius); padding: 9px 16px; font-size: 12.5px; color: var(--text); z-index: 200; opacity: 0; transform: translateY(6px); transition: opacity 0.18s, transform 0.18s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .section-hd { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .empty { color: var(--text3); text-align: center; padding: 2rem; font-size: 13px; }
  .scroll-body { overflow-y: auto; max-height: calc(100vh - 270px); }
  .scroll-body::-webkit-scrollbar { width: 3px; }
  .scroll-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .readonly-notice { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); padding: 5px 10px; background: var(--bg3); border-radius: var(--radius); border: 1px solid var(--border); }
  @media (max-width: 700px) { .sidebar { display: none; } .topbar-title { font-size: 13px; } }
</style>
</head>
<body>

<!-- ── Login Modal (shown when admin tries to edit while logged out) ── -->
<div class="modal-overlay" id="loginOverlay" style="display:none;" onclick="event.stopPropagation()">
  <div class="modal" style="width:380px;">

      <div class="login-field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="login-err" id="loginErr"></div>
      <button class="btn accent" style="width:100%" onclick="doLogin()">Sign In</button>

</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">America Prays</div>
      <div class="brand-sub">Jun 4 – Jul 4, 2026 · 31 Days</div>
    </div>

    <!-- Auth status -->
    <div class="auth-badge" id="authBadge">
      <div class="auth-dot offline" id="authDot"></div>
      <span class="auth-label" id="authLabel">Public view</span>
      <button class="auth-btn-small" id="authBtn" onclick="handleAuthBtn()">Login</button>
    </div>

    <div style="padding: 7px 5px 0;">
      <div class="nav-item active" id="nav-schedule"  onclick="switchView('schedule')"><span class="nav-icon">📅</span> Schedule</div>
      <div class="nav-item"        id="nav-resources" onclick="switchView('resources')"><span class="nav-icon">👥</span> Resources</div>

        <div class="topbar-title" id="topTitle">Day 1 — June 4, 2026</div>
        <div class="topbar-sub" id="topSub">
          ET &amp; IST · 48 slots × 30 min ·
          <span class="sync-dot synced" id="syncDot"></span><span id="syncLabel">Ready</span>
        </div>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-left:auto;" id="topbarActions">
        <!-- Populated dynamically based on auth state -->
      </div>

  </div>
</div>

</div>

<script>
// ---
// CONFIGURATION - paste your Supabase credentials here
// ---
const SUPABASE_URL  = https://gyghwlrlnjizqfmqessr.supabase.co/rest/v1/
const SUPABASE_ANON = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5Z2h3bHJsbmppenFmbXFlc3NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTI4NDIsImV4cCI6MjA5NTg4ODg0Mn0.bWlcuwFjf-egteUqj2l4mBjwhLfvLb_H6fIw1C-Vlvo

// ---
// CONSTANTS
// ---
const TOTAL_DAYS    = 31;
const START_DATE    = new Date(2026, 5, 4);   // June 4, 2026
const SLOTS         = 48;
const PRIME_START   = 34;                     // 5:00 PM ET
const PRIME_END     = 43;                     // 9:30 PM ET (covers 510 PM window)
const PRIME_PER_DAY = PRIME_END - PRIME_START + 1;
const SLOT_GAP      = 16;                     // 8 hours = 16  30-min slots
const MIN_PRIME     = 4;
const DEFAULT_RES_COUNT = 44;
const PHASE2_START_DAY  = 17;                 // Day index 17 = Jun 21 (resources 3943 start here)
const DAYS = TOTAL_DAYS;

// ---
// STATE
// ---
let sb;                         // Supabase client
let currentUser = null;         // null = public viewer
let resources   = [];           // string[]
let schedule    = [];           // schedule[day][slot] = resourceIndex
let currentView = 'schedule';
let currentDay  = 0;
let realtimeSub = null;

// ---
// INIT
// ---
(async function init() {
  // Init Supabase client
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user ?? null;
  updateAuthUI();

  // Listen for auth changes
  sb.auth.onAuthStateChange((_event, session) => {
    currentUser = session?.user ?? null;
    updateAuthUI();
    renderAll();
  });

  // Load data from Supabase
  await loadData();
  renderAll();
  subscribeRealtime();
})();

// ---
// AUTH
// ---
function isAdmin() { return currentUser !== null; }

function updateAuthUI() {
  const dot   = document.getElementById('authDot');
  const label = document.getElementById('authLabel');
  const btn   = document.getElementById('authBtn');
  if (isAdmin()) {
    dot.className   = 'auth-dot online';
    label.textContent = currentUser.email.split('@')[0];
    btn.textContent = 'Logout';
  } else {
    dot.className   = 'auth-dot offline';
    label.textContent = 'Public view';
    btn.textContent = 'Login';
  }
  renderTopbarActions();
}

function handleAuthBtn() {
  if (isAdmin()) doLogout();
  else showLogin();
}

function showLogin() {
  document.getElementById('loginEmail').value    = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('loginOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('loginEmail').focus(), 100);
}
function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Enter email and password.'; return; }
  const btn = document.querySelector('#loginBody .btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.textContent = 'Sign In'; btn.disabled = false;
  if (error) { errEl.textContent = error.message; return; }
  closeLogin();
  toast('Signed in ✓');
}

async function doLogout() {
  await sb.auth.signOut();
  toast('Signed out ✓');
}

// ---
// TOPBAR ACTIONS  differ for admin vs public
// ---
function renderTopbarActions() {
  const el = document.getElementById('topbarActions');
  if (isAdmin()) {
    el.innerHTML = `
      <input type="file" id="csvScheduleInput" accept=".csv" style="display:none;" onchange="loadScheduleCSV(event)">
      <input type="file" id="csvResourcesInput" accept=".csv" style="display:none;" onchange="importResourcesCSV(event)">
      <button class="btn" onclick="document.getElementById('csvScheduleInput').click()">📂 Load Schedule</button>
      <button class="btn accent" onclick="exportScheduleCSV()">⬇ Export Schedule</button>
      <button class="btn prime-btn" onclick="exportResourcesCSV()">⬇ Export Resources</button>
      <button class="btn" onclick="document.getElementById('csvResourcesInput').click()">📥 Import Resources</button>`;
  } else {
    el.innerHTML = `
      <button class="btn accent" onclick="exportScheduleCSV()">⬇ Export Schedule</button>

// ---
// SUPABASE DATA LAYER
// ---
function setSyncState(state, msg) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = `sync-dot ${state}`;
  lbl.textContent = msg;
}

async function loadData() {
  setSyncState('syncing', 'Loading…');
  try {
    // Load resources
    const { data: resRows, error: resErr } = await sb
      .from('resources')
      .select('idx, name')
      .order('idx');
    if (resErr) throw resErr;

    // Load schedule
    const { data: schedRows, error: schedErr } = await sb
      .from('schedule')
      .select('day, slot, resource_idx');
    if (schedErr) throw schedErr;

    if (resRows && resRows.length > 0) {
      resources = resRows.map(r => r.name);
    } else {
      // First run  seed defaults
      resources = defaultResources();
      await seedResources();
    }

    if (schedRows && schedRows.length === DAYS * SLOTS) {
      schedule = Array.from({length: DAYS}, (_, d) => new Array(SLOTS).fill(0));
      schedRows.forEach(r => { schedule[r.day][r.slot] = r.resource_idx; });
    } else {
      // First run  generate and seed
      generateSchedule();
      await seedSchedule();
    }

    setSyncState('synced', 'Synced');
  } catch(e) {
    setSyncState('error', 'Offline');
    toast('⚠ Could not load from Supabase: ' + e.message);
    // Fall back to local defaults so app still works
    if (!resources.length) resources = defaultResources();
    if (!schedule.length)  generateSchedule();
  }
}

async function seedResources() {
  const rows = resources.map((name, idx) => ({ idx, name }));
  await sb.from('resources').upsert(rows, { onConflict: 'idx' });
}

async function seedSchedule() {
  const rows = [];
  for (let d = 0; d < DAYS; d++)
    for (let s = 0; s < SLOTS; s++)
      rows.push({ day: d, slot: s, resource_idx: schedule[d][s] });
  // Batch in chunks of 500 to stay within Supabase limits
  for (let i = 0; i < rows.length; i += 500) {
    await sb.from('schedule').upsert(rows.slice(i, i + 500), { onConflict: 'day,slot' });
  }
}

async function saveSlot(d, s, resourceIdx) {
  setSyncState('syncing', 'Saving…');
  const { error } = await sb
    .from('schedule')
    .upsert({ day: d, slot: s, resource_idx: resourceIdx }, { onConflict: 'day,slot' });
  if (error) { setSyncState('error', 'Save failed'); toast('⚠ Save failed: ' + error.message); return false; }
  setSyncState('synced', 'Saved');
  return true;
}

async function saveResourceName(idx, name) {
  setSyncState('syncing', 'Saving…');
  const { error } = await sb
    .from('resources')
    .upsert({ idx, name }, { onConflict: 'idx' });
  if (error) { setSyncState('error', 'Save failed'); toast('⚠ Save failed: ' + error.message); return false; }
  setSyncState('synced', 'Saved');
  return true;
}

async function saveAllResources() {
  setSyncState('syncing', 'Saving…');
  const rows = resources.map((name, idx) => ({ idx, name }));
  const { error } = await sb.from('resources').upsert(rows, { onConflict: 'idx' });
  if (error) { setSyncState('error', 'Save failed'); toast('⚠ Save failed: ' + error.message); return false; }
  setSyncState('synced', 'Saved');
  return true;
}

// ---
// REALTIME SYNC
// ---
function subscribeRealtime() {
  if (realtimeSub) sb.removeChannel(realtimeSub);
  realtimeSub = sb
    .channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'schedule' }, payload => {
      const { day, slot, resource_idx } = payload.new;
      if (schedule[day]) schedule[day][slot] = resource_idx;
      if (currentView === 'schedule' && day === currentDay) fillScheduleRows('');
      if (currentView === 'resources') fillResGrid('');
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'resources' }, payload => {
      const { idx, name } = payload.new;
      if (idx < resources.length) resources[idx] = name;
      renderAll();
    })
    .subscribe();
}

// DEFAULT RESOURCES
// ---
function defaultResources() {
  return Array.from({length: DEFAULT_RES_COUNT}, (_, i) =>
    i < 39 ? `Resource ${String(i+1).padStart(2,'0')}` : `TBC ${String(i-38).padStart(2,'0')}`
  );
}

// ---
// SCHEDULE GENERATION
// ---
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function tryGenerate() {
  const n = resources.length;
  const p2Days = DAYS - PHASE2_START_DAY;
  const p1TotalSlots = DAYS * SLOTS;
  const p2TotalSlots = p2Days * SLOTS;
  const p1PrimeSlots = DAYS * PRIME_PER_DAY;
  const p2PrimeSlots = p2Days * PRIME_PER_DAY;
  const nP1 = Math.min(39, n), nP2 = Math.max(0, n - 39);

  const targetTotal = new Array(n).fill(0);
  const targetPrime = new Array(n).fill(0);

  if (nP1 > 0) {
    const base=Math.floor(p1TotalSlots/nP1), extra=p1TotalSlots%nP1;
    const baseP=Math.floor(p1PrimeSlots/nP1), extraP=p1PrimeSlots%nP1;
    for (let i=0; i<nP1; i++) { targetTotal[i]=base+(i<extra?1:0); targetPrime[i]=Math.max(MIN_PRIME,baseP+(i<extraP?1:0)); }
  }
  if (nP2 > 0) {
    const base=Math.floor(p2TotalSlots/nP2), extra=p2TotalSlots%nP2;
    const baseP=Math.floor(p2PrimeSlots/nP2), extraP=p2PrimeSlots%nP2;
    for (let i=0; i<nP2; i++) { const ri=39+i; targetTotal[ri]=base+(i<extra?1:0); targetPrime[ri]=Math.max(MIN_PRIME,baseP+(i<extraP?1:0)); }
  }

  schedule = Array.from({length:DAYS}, () => new Array(SLOTS).fill(-1));
  const gotTotal=new Array(n).fill(0), gotPrime=new Array(n).fill(0);

  const isAvail = (ri, d) => ri < 39 || d >= PHASE2_START_DAY;
  const canAssign = (ri, d, L) => {
    if (!isAvail(ri, d)) return false;
    const lo=Math.max(0,L-SLOT_GAP+1), hi=Math.min(DAYS*SLOTS-1,L+SLOT_GAP-1);
    for (let L2=lo; L2<=hi; L2++) {
      if (L2===L) continue;
      const d2=Math.floor(L2/SLOTS), s2=L2%SLOTS;
      if (schedule[d2]&&schedule[d2][s2]===ri) return false;
    }
    return true;
  };
  const pickBest = (cands, byPrime) => {
    shuffle(cands);
    cands.sort((a,b) => {
      if (byPrime) { const pa=targetPrime[a]-gotPrime[a], pb=targetPrime[b]-gotPrime[b]; if (pa!==pb) return pb-pa; }
      return (targetTotal[b]-gotTotal[b])-(targetTotal[a]-gotTotal[a]);
    });
    return cands[0];
  };

  for (let d=0; d<DAYS; d++) {
    for (let s=PRIME_START; s<=PRIME_END; s++) {
      const L=d*SLOTS+s;
      let c=[];
      for (let i=0;i<n;i++) if (gotPrime[i]<targetPrime[i]&&gotTotal[i]<targetTotal[i]&&canAssign(i,d,L)) c.push(i);
      if (!c.length) for (let i=0;i<n;i++) if (gotTotal[i]<targetTotal[i]&&canAssign(i,d,L)) c.push(i);
      if (!c.length) for (let i=0;i<n;i++) if (canAssign(i,d,L)) c.push(i);
      if (!c.length) return false;
      const ch=pickBest(c,true); schedule[d][s]=ch; gotTotal[ch]++; gotPrime[ch]++;
    }
  }
  for (let d=0; d<DAYS; d++) {
    for (let s=0; s<SLOTS; s++) {
      if (s>=PRIME_START&&s<=PRIME_END) continue;
      const L=d*SLOTS+s;
      let c=[];
      for (let i=0;i<n;i++) if (gotTotal[i]<targetTotal[i]&&canAssign(i,d,L)) c.push(i);
      if (!c.length) for (let i=0;i<n;i++) if (canAssign(i,d,L)) c.push(i);
      if (!c.length) return false;
      const ch=pickBest(c,false); schedule[d][s]=ch; gotTotal[ch]++;
    }
  }
  return true;
}

function generateSchedule() {
  if (!resources.length) return false;
  for (let a=0; a<500; a++) if (tryGenerate()) return true;
  toast('⚠ Could not build a fully constraint-compliant schedule.');
  return false;
}

// ---
// TIME HELPERS
// ---
function slotToET(s)  { const h=Math.floor(s/2),m=s%2===0?'00':'30',ap=h<12?'AM':'PM',h12=h===0?12:h>12?h-12:h; return `${h12}:${m} ${ap}`; }
function slotToIST(s) {
  const tot=s*30+9*60+30, dov=Math.floor(tot/(24*60)), rem=tot%(24*60), h=Math.floor(rem/60), m=rem%60;
  const ap=h<12?'AM':'PM', h12=h===0?12:h>12?h-12:h, suf=dov>0?` +${dov}d`:'';
  return `${h12}:${m===0?'00':m} ${ap}${suf}`;
}
function slotType(s) {
  if (s>=PRIME_START&&s<=PRIME_END) return 'prime';
  const h=s/2; if (h>=6&&h<12) return 'morning'; if (h>=12&&h<17) return 'afternoon'; if (h>=22) return 'night'; return 'mid';
}
function typeLabel(t) { return {prime:'Prime Time',morning:'Morning',afternoon:'Afternoon',night:'Evening',mid:'Overnight'}[t]||t; }
function getDate(d)   { const dt=new Date(START_DATE); dt.setDate(dt.getDate()+d); return dt; }
function dateStr(d)   { return getDate(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
function shortDate(d) { return getDate(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

function switchView(v) {
  currentView=v;
  ['schedule','resources','prime'].forEach(x => document.getElementById('nav-'+x).classList.toggle('active',x===v));
  renderAll();
}
function renderAll() {
  buildDayList();

  else if (currentView==='resources') renderResources();
  else if (currentView==='prime')     renderPrime();
}

function buildDayList() {
  const el=document.getElementById('dayList'); el.innerHTML='';

    b.className='day-btn'+(d===currentDay&&currentView==='schedule'?' active':'');

    b.onclick=(function(dd){return function(){currentDay=dd;currentView='schedule';switchView('schedule');};})(d);

}

}

function prevDay() { if (currentDay>0)       { currentDay--; renderSchedule(); buildDayList(); } }
function nextDay() { if (currentDay<DAYS-1)  { currentDay++; renderSchedule(); buildDayList(); } }

async function saveSlotEdit(d, s) {
  if (!isAdmin()) return;
  const sel=document.getElementById('slotResSelect');
  const newIdx=parseInt(sel.value);
  schedule[d][s]=newIdx;
  closeModalDirect();
  await saveSlot(d, s, newIdx);

}

function renderResources() {
  document.getElementById('topTitle').textContent=`Resource Persons — ${resources.length} Total`;

function filterResources() { fillResGrid((document.getElementById('resSearch')?.value||'').toLowerCase()); }

function fillResGrid(q) {
  const grid=document.getElementById('resGrid'); if (!grid) return;
  grid.innerHTML='';
  const filtered=resources.map((r,i)=>({r,i})).filter(({r})=>!q||r.toLowerCase().includes(q))
    .sort((a,b)=>a.r.localeCompare(b.r,undefined,{sensitivity:'base'}));
  document.getElementById('resCount').textContent=`Showing ${filtered.length} of ${resources.length} resources`;
  filtered.forEach(({r,i}) => {
    let total=0, prime=0;

      ? `<input type="text" value="${escHtml(r)}" id="res-input-${i}" onblur="renameResource(${i})" onkeydown="if(event.key==='Enter')this.blur()" style="font-weight:500;color:var(--text);">`

      ? `<div style="display:flex;gap:5px;margin-top:7px;">

         </div>`
      : `<div style="margin-top:7px;"><button class="btn" style="font-size:11px;padding:3px 9px;" onclick="viewResourceSlots(${i})">View Slots</button></div>`;

      <div class="res-name">${nameField}</div>
      <div class="res-meta">${total} total <span class="res-prime-badge">★ ${prime} prime</span></div>

async function renameResource(i) {
  if (!isAdmin()) return;
  const inp=document.getElementById(`res-input-${i}`); if (!inp) return;
  const val=inp.value.trim();
  if (val&&val!==resources[i]) {
    resources[i]=val;
    await saveResourceName(i, val);
    toast(`Renamed to "${val}" ✓`);
  }
}

async function addResource() {
  if (!isAdmin()) return;
  const name=`Resource ${String(resources.length+1).padStart(2,'0')}`;
  const idx=resources.length;
  resources.push(name);
  await saveResourceName(idx, name);
  renderResources();
  toast('Resource added ✓');
}

function confirmDeleteResource(i) {
  if (!isAdmin()) return;
  document.getElementById('modalBody').innerHTML=`
    <h3>Remove Resource?</h3>

      <button class="btn" style="flex:1" onclick="closeModalDirect()">Cancel</button>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
}

async function deleteResource(i) {
  if (!isAdmin()) return;
  resources.splice(i,1);
  for (let d=0;d<DAYS;d++) for (let s=0;s<SLOTS;s++) {
    if (schedule[d][s]===i) schedule[d][s]=0;

  closeModalDirect();
  await saveAllResources();
  await seedSchedule();
  renderResources();

}

}

// ---
// PRIME TIME VIEW
// ---
function renderPrime() {
  document.getElementById('topTitle').textContent='Prime Time Coverage';
  const mc=document.getElementById('mainContent');
  let allOk=true, below=0, rows='';
  const sorted=resources.map((r,i)=>({r,i})).sort((a,b)=>a.r.localeCompare(b.r,undefined,{sensitivity:'base'}));
  sorted.forEach(({r,i})=>{
    let pSlots=[];
    for (let d=0;d<DAYS;d++) schedule[d].forEach((ri,s)=>{if(ri===i&&slotType(s)==='prime')pSlots.push({d,s});});
    pSlots.sort((a,b)=>a.d-b.d||a.s-b.s);
    const cnt=pSlots.length, ok=cnt>=MIN_PRIME;
    if (!ok){allOk=false;below++;}
    let firstET='—', firstIST='—';
    if (cnt>0){const{d,s}=pSlots[0];firstET=shortDate(d)+' '+slotToET(s);firstIST=slotToIST(s);}
    rows+=`<div class="prime-item">
      <div class="${ok?'ok-dot':'warn-dot'}"></div>
      <div class="res">${escHtml(r)}</div>
      <div class="slots">${cnt} prime slot${cnt!==1?'s':''}</div>
      <div class="first">${firstET}</div>
      <div class="first" style="color:var(--text3)">${firstIST} IST</div>
    </div>`;
  });
  const bc=allOk?'var(--success)':'var(--danger)', bb=allOk?'rgba(52,201,138,0.09)':'rgba(224,90,90,0.09)', bbd=allOk?'rgba(52,201,138,0.22)':'rgba(224,90,90,0.22)';
  const msg=allOk?`✓ All ${resources.length} resources meet the ≥${MIN_PRIME} prime slot requirement.`:`⚠ ${below} resource${below!==1?'s':''} below the ≥${MIN_PRIME} prime slot minimum.`;
  mc.innerHTML=`
    <div style="margin-bottom:12px;padding:11px 14px;border-radius:var(--radius);background:${bb};border:1px solid ${bbd}">
      <span style="font-size:12.5px;font-weight:500;color:${bc}">${msg}</span>
    </div>
    <div class="tbl-wrap"><div class="scroll-body" style="max-height:calc(100vh - 250px)"><div style="padding:6px 0">${rows}</div></div></div>`;
}

// ---
// CSV IMPORT / EXPORT
// ---
function parseCSVLine(line) {
  const out=[]; let field='', inQ=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if (inQ){if(c==='"'){if(line[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}
    else{if(c===','){out.push(field);field='';}else if(c==='"')inQ=true;else field+=c;}
  }
  out.push(field); return out;
}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}

function exportScheduleCSV() {
  let csv='Day,Date,Slot #,ET Start,IST Start,Resource,Time Block\n';
  schedule.forEach((day,d)=>{
    const dt=getDate(d).toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
    day.forEach((ri,s)=>{
      const r=resources[ri]||'—';
      csv+=`${d+1},"${dt}",${s+1},"${slotToET(s)}","${slotToIST(s)}","${r.replace(/"/g,'""')}","${typeLabel(slotType(s))}"\n`;
    });
  });
  download('america_prays_schedule.csv',csv,'text/csv');
  toast('Schedule CSV downloaded ✓');
}

function exportResourcesCSV() {
  let csv='Index,Name,Total Slots,Prime Slots\n';
  resources.forEach((r,i)=>{
    let total=0,prime=0;
    schedule.forEach(day=>day.forEach((ri,s)=>{if(ri===i){total++;if(slotType(s)==='prime')prime++;}}));
    csv+=`${i+1},"${r.replace(/"/g,'""')}",${total},${prime}\n`;
  });
  download('america_prays_resources.csv',csv,'text/csv');
  toast('Resources CSV downloaded ✓');
}

function loadScheduleCSV(event) {
  if (!isAdmin()) return;
  const file=event.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try {
      const text=e.target.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      const lines=text.split('\n').filter(l=>l.trim());
      if (lines.length<2) throw new Error('CSV is empty');
      const hdr=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
      const cDay=hdr.indexOf('day'), cSlot=hdr.findIndex(h=>h.replace(/[^a-z0-9]/g,'')==='slot'||h==='slot #'), cRes=hdr.indexOf('resource');
      if (cDay<0||cSlot<0||cRes<0) throw new Error('Missing columns: Day, Slot #, Resource');
      const seen=new Map(), rows=[];
      for (let i=1;i<lines.length;i++){
        const p=parseCSVLine(lines[i]);
        const day=parseInt(p[cDay],10), slot=parseInt(p[cSlot],10), res=(p[cRes]||'').trim();
        if (isNaN(day)||isNaN(slot)||!res) continue;
        if (!seen.has(res)) seen.set(res,seen.size);
        rows.push({d:day-1,s:slot-1,ri:seen.get(res)});
      }
      const newRes=[...seen.keys()];
      const newSched=Array.from({length:DAYS},()=>new Array(SLOTS).fill(0));
      let placed=0;
      for (const{d,s,ri}of rows) if(d>=0&&d<DAYS&&s>=0&&s<SLOTS){newSched[d][s]=ri;placed++;}
      if (placed===0) throw new Error('No valid rows found');
      resources=newRes; schedule=newSched;
      await saveAllResources(); await seedSchedule();
      renderAll(); toast(`Loaded ${placed} slots, ${resources.length} resources ✓`);
    } catch(err){toast('Load failed: '+err.message);}
  };
  reader.readAsText(file); event.target.value='';
}

async function importResourcesCSV(event) {
  if (!isAdmin()) return;
  const file=event.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try {
      const text=e.target.result.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      const lines=text.split('\n').filter(l=>l.trim());
      if (lines.length<2) throw new Error('CSV is empty');
      const hdr=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
      const cName=hdr.findIndex(h=>h==='name'||h==='resource'||h==='resource name');
      if (cName<0) throw new Error('No "Name" column found');
      const names=[];
      for (let i=1;i<lines.length;i++){const p=parseCSVLine(lines[i]);const nm=(p[cName]||'').trim();if(nm)names.push(nm);}
      if (!names.length) throw new Error('No resource names found');
      const oldCount=resources.length;
      resources=names;
      if (names.length!==oldCount){
        toast(`Imported ${names.length} resources. Regenerating schedule…`);
        setTimeout(async()=>{generateSchedule();await saveAllResources();await seedSchedule();renderAll();toast(`${names.length} resources imported + schedule regenerated ✓`);},200);
      } else {
        await saveAllResources();
        renderAll(); toast(`${names.length} resources imported ✓`);
      }
    } catch(err){toast('Import failed: '+err.message);}
  };
  reader.readAsText(file); event.target.value='';
}

// ---
// MODAL & TOAST HELPERS
// ---
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').style.display='none';}
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
